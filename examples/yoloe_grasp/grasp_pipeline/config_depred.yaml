# =============================================================================
# Grasp Pipeline Configuration
# =============================================================================

# Observation pose - joint angles [rad] for the 6 arm joints
# This pose should give a good downward view of the workspace
observation_pose: [0.0, 1.0, -0.93, 0.83, 0.0, 0.0]

# Camera settings
camera:
  width: 1280
  height: 720
  color_fps: 15
  depth_fps: 5     # D405 only supports 5fps for depth at 1280x720
  # Depth scale factor: raw_depth / factor_depth = meters
  # D405 depth_scale = 0.0001 (1 raw unit = 0.1mm), so factor_depth = 10000
  factor_depth: 10000
  # Show live camera preview before capturing (press 'c' to capture, 'q' to quit)
  live_preview: true

# GraspNet model settings
graspnet:
  # Path to trained checkpoint (relative to project root)
  checkpoint_path: "refence_code/graspnet-baseline/logs/log_realsense/checkpoint-rs.tar"
  # Path to graspnet-baseline code (relative to project root)
  graspnet_root: "refence_code/graspnet-baseline"
  num_point: 20000
  num_view: 300
  collision_thresh: 0.01
  voxel_size: 0.01
  # Maximum number of grasps to consider after NMS
  max_grasps: 50

# YOLOe text-prompt object detection (2D grasp mode)
yoloe:
  enabled: true
  # Path to YOLOe checkpoint (relative to project root)
  checkpoint: "refence_code/yoloe/yoloe-v8l-seg.pt"
  # Target object names (text prompts)
  target_names: "banana"
  device: "cuda:0"
  conf_threshold: 0.25
  # Height offset above detected surface (meters). For flat objects on table,
  # set to roughly half the object height so fingers don't hit the table.
  grasp_height_offset: 0.015

# Workspace mask settings
# "upper_half" = upper half white, lower half black
# "center_crop" = full height, but crop left/right borders
# "custom" = explicit crop margins
# "depth_range" = mask from depth range (min_depth, max_depth)
workspace:
  mask_type: "custom"
  crop_left: 130
  crop_right: 130
  crop_bottom: 400  # 360 (half) + 20 pixels extending upward
  crop_top: 20
  min_depth: 0.1
  max_depth: 0.6

# Hand-eye calibration
handeye:
  # Path to calibration YAML (relative to project root)
  calibration_path: "examples/handeye/handeye_calibration.yaml"

# TCP offset from gripper_link origin to actual finger contact center
# In gripper_link local frame [x, y, z] in meters
# gripper_link → finger_joints is ~0.037m along x-axis
tcp_offset: [0.037, 0.0, 0.0]

# Motion execution parameters
motion:
  # Pre-grasp offset along approach direction [meters]
  pre_grasp_offset: 0.05
  # Post-grasp lift height [meters]
  post_grasp_lift: 0.10
  # Smooth motion interpolation steps
  smooth_steps: 30
  # Control rate [Hz]
  control_rate_hz: 10.0

# Safety
safety:
  # Prompt user before executing each motion phase
  confirm_each_phase: false
  # Joint position limits [rad] - for validation
  joint_limits:
    min: [-3.14, -1.57, -3.14, -1.57, -3.14, -3.14]
    max: [3.14, 1.57, 3.14, 1.57, 3.14, 3.14]
